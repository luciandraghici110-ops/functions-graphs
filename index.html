<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graficator Funcții</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.0.0/math.min.js"></script>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #0a0a0f;
  color: white;
  overflow: hidden;
}

header {
  padding: 12px;
  background: #111;
  border-bottom: 1px solid #222;
}

.app {
  display: flex;
  height: calc(100vh - 50px);
}

.sidebar {
  width: 280px;
  background: #111;
  padding: 10px;
  border-right: 1px solid #222;
  overflow-y: auto;
}

input, button {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  background: #0a0a0f;
  border: 1px solid #333;
  color: white;
}

button {
  cursor: pointer;
}

button:hover {
  border-color: #00e5ff;
}

.func-item {
  padding: 6px;
  margin-top: 5px;
  border: 1px solid #333;
  cursor: pointer;
}

.canvas-wrap {
  flex: 1;
  position: relative;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>

<body>

<header>
  <b>Graficator de Funcții</b>
</header>

<div class="app">

  <div class="sidebar">
    <input id="funcInput" placeholder="ex: x^2 + 3*x">

    <button onclick="addFunction()">Adaugă funcție</button>

    <div id="list"></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let funcs = [];

let view = {
  xMin: -10,
  xMax: 10,
  yMin: -10,
  yMax: 10
};

function resize() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  draw();
}
window.addEventListener("resize", resize);
resize();

function toCanvas(x, y) {
  return [
    (x - view.xMin) / (view.xMax - view.xMin) * canvas.width,
    canvas.height - (y - view.yMin) / (view.yMax - view.yMin) * canvas.height
  ];
}

// 🔥 FIX PRINCIPAL: input curat pentru PC + telefon
function cleanExpr(expr) {
  return expr
    .replace(/×/g, "*")
    .replace(/−/g, "-")
    .replace(/\s+/g, "");
}

function addFunction() {
  let input = document.getElementById("funcInput");
  let expr = cleanExpr(input.value);

  if (!expr) return;

  let compiled;

  try {
    compiled = math.compile(expr);

    // test simplu
    compiled.evaluate({ x: 1 });

  } catch (e) {
    alert("Funcție invalidă");
    return;
  }

  funcs.push({
    expr,
    compiled,
    color: randomColor()
  });

  input.value = "";
  renderList();
  draw();
}

function randomColor() {
  return `hsl(${Math.random() * 360},100%,60%)`;
}

function drawGrid() {
  ctx.strokeStyle = "#1a1a2a";
  ctx.lineWidth = 1;

  let step = 1;

  for (let x = view.xMin; x < view.xMax; x += step) {
    let [px] = toCanvas(x, 0);
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px, canvas.height);
    ctx.stroke();
  }

  for (let y = view.yMin; y < view.yMax; y += step) {
    let [, py] = toCanvas(0, y);
    ctx.beginPath();
    ctx.moveTo(0, py);
    ctx.lineTo(canvas.width, py);
    ctx.stroke();
  }
}

function drawAxes() {
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 2;

  let [ox, oy] = toCanvas(0, 0);

  ctx.beginPath();
  ctx.moveTo(0, oy);
  ctx.lineTo(canvas.width, oy);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(ox, 0);
  ctx.lineTo(ox, canvas.height);
  ctx.stroke();
}

function drawFunc(f) {
  ctx.strokeStyle = f.color;
  ctx.lineWidth = 2;

  ctx.beginPath();

  let first = true;

  for (let i = 0; i < canvas.width; i++) {
    let x = view.xMin + (i / canvas.width) * (view.xMax - view.xMin);

    let y;
    try {
      y = f.compiled.evaluate({ x });
    } catch {
      continue;
    }

    let [px, py] = toCanvas(x, y);

    if (first) {
      ctx.moveTo(px, py);
      first = false;
    } else {
      ctx.lineTo(px, py);
    }
  }

  ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawGrid();
  drawAxes();

  funcs.forEach(f => drawFunc(f));
}

function renderList() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  funcs.forEach((f, i) => {
    let div = document.createElement("div");
    div.className = "func-item";
    div.style.borderColor = f.color;
    div.innerText = f.expr;

    div.onclick = () => {
      funcs.splice(i, 1);
      renderList();
      draw();
    };

    list.appendChild(div);
  });
}

// Enter key support
document.getElementById("funcInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addFunction();
});

draw();
</script>

</body>
</html>
